services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dodo
      POSTGRES_PASSWORD: dodo
      POSTGRES_DB: dodo
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dodo -d dodo"]
      interval: 3s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://dodo:dodo@postgres:5432/dodo
      LISTEN_ADDR: 0.0.0.0:8080
      MOCK_PSP_BASE_URL: http://app:8080
      PAY_SYNC_WAIT_SECS: "8"
      PSP_HTTP_TIMEOUT_SECS: "35"
      RUST_LOG: dodo_invoice_service=debug,tower_http=info
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
